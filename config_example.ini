[HomeAssistant]
url = http://192.168.1.xxx:8123/api
auth_token = YOUR_LONG_LIVED_ACCESS_TOKEN_HERE
webhook_id = YOUR_WEBHOOK_ID_HERE

[Tracks]
# Format: track_name = delay_in_ms
# A negative delay means the command will be sent EARLY (e.g. -3500 sends it 3.5s before the timestamp)
wind = -3500
color = 0
lightning = 0
fire = 0
movieinfo = 0

[WLED]
# Comma separated list of WLED IP addresses for direct UDP lightning control
ips = 192.168.1.98, 192.168.1.62
